<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTalk Global</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        /* Fondo de la antena parabólica original para la cabecera */
        .bg-parabolica {
            background-image: linear-gradient(to bottom, rgba(17, 24, 39, 0.85), rgba(17, 24, 39, 0.95)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
        }
        /* Animación personalizada para el parpadeo suave del autobús del inicio */
        @keyframes parpadeoBus {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.4)); }
        }
        .animacion-bus {
            animation: parpadeoBus 2.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col justify-between p-4 selection:bg-yellow-500/30">

    <div id="pantallaLogin" class="max-w-md w-full mx-auto my-auto bg-gray-900 rounded-2xl shadow-2xl p-6 border border-gray-800">
        <div class="text-center mb-7">
            <div class="inline-flex items-center justify-center p-4 bg-yellow-500/10 rounded-full text-yellow-500 mb-4 animacion-bus">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 16v3a1 1 0 01-1 1H6a1 1 0 01-1-1v-3m14 0V9a2 2 0 00-2-2H7a2 2 0 00-2 2v7m14 0H5m2 4h2m6 0h2m-8-4V10h10v6M7 10h10M4 10h1m14 0h1M9 7h6" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-wider uppercase">BusTalk <span class="text-yellow-500 text-sm font-medium lowercase">global</span></h1>
            <p class="text-gray-400 text-xs mt-1">Configura tu terminal de conducción</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Tu Nombre o Alias</label>
                <input type="text" id="inputNombre" placeholder="Ej: Conductor 42" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition-colors">
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-1">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Nº Bus</label>
                    <input type="text" id="inputBus" placeholder="180" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-3 text-white text-center font-bold focus:outline-none focus:border-yellow-500 transition-colors">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Código de Grupo / Línea</label>
                    <input type="text" id="inputComunidad" placeholder="Ej: LINEA-01" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white uppercase font-mono tracking-wider focus:outline-none focus:border-yellow-500 transition-colors">
                </div>
            </div>

            <button onclick="conectarComunidad()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-950 font-black py-3 rounded-xl transition-all shadow-lg shadow-yellow-900/20 active:scale-98 cursor-pointer mt-2 uppercase tracking-wider text-sm">
                Iniciar Terminal
            </button>
        </div>
    </div>

    <div id="pantallaApp" class="max-w-md w-full mx-auto bg-gray-900 rounded-2xl shadow-2xl overflow-hidden border border-gray-800 flex-col flex-1 hidden">
        
        <div class="bg-parabolica p-4 flex justify-between items-center border-b border-gray-800 shadow-md">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 text-gray-950 font-black px-3 py-1.5 rounded-lg text-sm tracking-wide shadow shadow-black flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-gray-800 leading-none">BUS</span>
                    <span id="txtNumeroBus" class="text-base leading-none mt-0.5">---</span>
                </div>
                <div>
                    <h2 class="text-xl font-black tracking-wider uppercase m-0 leading-none">
                        <span class="text-yellow-500">Bus</span><span class="text-white">Talk</span>
                    </h2>
                    <p id="txtComunidadActiva" class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mt-1">GRUPO: ---</p>
                </div>
            </div>

            <div class="flex items-center gap-1.5">
                <button onclick="conectarBluetooth()" id="btnBluetooth" class="p-2 bg-gray-800/80 text-blue-400 rounded-lg border border-gray-700/50 hover:bg-gray-700 transition-all cursor-pointer" title="Vincular Manos Libres">
                    🎙️
                </button>
                <button onclick="salirApp()" class="p-2 bg-red-950/80 text-red-400 rounded-lg border border-red-900/50 hover:bg-red-900 transition-all cursor-pointer font-bold text-xs">
                    🚪 Salir
                </button>
            </div>
        </div>

        <div class="p-4 flex flex-col flex-1 justify-between gap-4">
            
            <div class="bg-gray-950 border border-gray-850 rounded-xl p-3 flex flex-col gap-3 flex-1 justify-between min-h-[150px]">
                <div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Conductores activos en tu grupo:</span>
                    <div id="listaUsuariosConectados" class="flex flex-wrap gap-1.5 text-xs">
                        <span class="bg-gray-900 text-gray-400 px-2 py-0.5 rounded-md border border-gray-800 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Buscando...
                        </span>
                    </div>
                </div>

                <div class="border-t border-gray-900 pt-2 flex-1 flex flex-col justify-end">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Actividad de Radio:</span>
                    <div id="listaMensajes" class="space-y-1.5 text-xs max-h-[120px] overflow-y-auto">
                        <p class="text-gray-600 italic text-center py-2">Canal limpio y en escucha...</p>
                    </div>
                </div>

                <div id="contenedorAudio" class="hidden">
                    <audio id="audioReproductor" autoplay controls class="w-full h-8 mt-1"></audio>
                </div>
            </div>

            <div class="flex items-center justify-between gap-2 py-4 px-2 bg-gray-900/50 rounded-2xl border border-gray-800/40">
                
                <button onclick="repetirUltimoAudio()" id="btnReplay" class="flex-1 max-w-[85px] py-4 px-1 rounded-xl text-center bg-gray-950 border border-gray-800 hover:bg-gray-900 transition-all text-gray-300 cursor-pointer shadow-sm active:scale-95">
                    <span class="block text-xl mb-1">↩️</span>
                    <span class="block text-[9px] font-black uppercase tracking-wider leading-none text-gray-400">Repetir</span>
                </button>

                <button id="btnPTT" onclick="toggleTransmision(false)" class="w-28 h-28 rounded-full bg-yellow-500 border-4 border-yellow-600/40 flex flex-col items-center justify-center transition-all duration-300 shadow-xl shadow-yellow-950/10 cursor-pointer select-none active:scale-95 z-10 shrink-0">
                    <span id="pttIcon" class="text-gray-950 text-2xl mb-0.5">🎙️</span>
                    <span id="pttTexto" class="text-[9px] font-black text-gray-950 uppercase tracking-wider text-center px-1 leading-tight">Pulsar para hablar</span>
                </button>

                <button onclick="toggleTransmision(true)" id="btnBroadcast" class="flex-1 max-w-[85px] py-4 px-1 rounded-xl text-center bg-gray-950 border border-gray-800 hover:bg-gray-900 transition-all text-gray-300 cursor-pointer shadow-sm active:scale-95">
                    <span id="btnBroadcastIcon" class="block text-xl mb-1">📢</span>
                    <span id="btnBroadcastTexto" class="block text-[9px] font-black uppercase tracking-wider leading-none text-gray-400">A Todos</span>
                </button>
                
            </div>
            <p class="text-[10px] text-gray-500 text-center leading-tight">Seguridad Vial: Un toque abre el canal de forma fija y otro lo cierra. No mantengas pulsado mientras conduces.</p>

        </div>
    </div>

    <script>
        // Tus credenciales reales de Firebase insertadas de forma segura y directa
        const firebaseConfig = {
            apiKey: "AIzaSyC7b6_T0ze2HgXiYHfvUeL12JSXE7ZKogc",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            databaseURL: "https://misturnos-fe3ea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:873240d85ac5160f392476",
            measurementId: "G-B6RRDBDM4R"
        };

        // Inicialización de la base de datos (Compat)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let usuario = "";
        let comunidad = "";
        let numBus = "";
        let transmitiendo = false;
        let esBroadcastGlobal = false;
        let urlUltimoAudioRecibido = ""; 
        let desvincularSala = null;
        let desvincularGlobal = null;

        function conectarComunidad() {
            const inputNombre = document.getElementById('inputNombre').value.trim();
            const inputComunidad = document.getElementById('inputComunidad').value.trim().toUpperCase();
            const inputBus = document.getElementById('inputBus').value.trim();

            if (!inputNombre || !inputComunidad || !inputBus) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            usuario = inputNombre;
            comunidad = inputComunidad;
            numBus = inputBus;

            document.getElementById('txtNumeroBus').textContent = numBus;
            document.getElementById('txtComunidadActiva').textContent = `GRUPO: ${comunidad}`;

            document.getElementById('pantallaLogin').classList.add('hidden');
            document.getElementById('pantallaApp').classList.remove('hidden');
            document.getElementById('pantallaApp').classList.add('flex');

            registrarPresencia();
            escucharCanales();
        }

        function salirApp() {
            if (transmitiendo) toggleTransmision(esBroadcastGlobal);
            if (desvincularSala) desvincularSala();
            if (desvincularGlobal) desvincularGlobal();

            document.getElementById('pantallaApp').classList.remove('flex');
            document.getElementById('pantallaApp').classList.add('hidden');
            document.getElementById('pantallaLogin').classList.remove('hidden');
        }

        function toggleTransmision(modoGlobal = false) {
            const btnPTT = document.getElementById('btnPTT');
            const iconPTT = document.getElementById('pttIcon');
            const pttTexto = document.getElementById('pttTexto');
            const btnBC = document.getElementById('btnBroadcast');
            const iconBC = document.getElementById('btnBroadcastIcon');
            const textoBC = document.getElementById('btnBroadcastTexto');

            if (!transmitiendo) {
                transmitiendo = true;
                esBroadcastGlobal = modoGlobal;

                if (esBroadcastGlobal) {
                    btnBC.className = "flex-1 max-w-[85px] py-4 px-1 rounded-xl text-center bg-red-950 border border-red-500 text-red-400 font-bold scale-105 animate-pulse z-20 shrink-0";
                    iconBC.textContent = "🚨";
                    textoBC.textContent = "EN AIRE";
                    btnPTT.className = "w-28 h-28 rounded-full bg-gray-900 border-4 border-gray-800 flex flex-col items-center justify-center opacity-40 shrink-0";
                } else {
                    btnPTT.className = "w-28 h-28 rounded-full bg-red-950 border-4 border-red-500 flex flex-col items-center justify-center transition-all duration-300 shadow-xl shadow-red-900/40 cursor-pointer scale-105 animate-pulse z-10 shrink-0";
                    iconPTT.textContent = "🔊";
                    iconPTT.className = "text-red-400 text-2xl mb-0.5";
                    pttTexto.textContent = "HABLANDO...";
                    pttTexto.className = "text-[9px] font-black text-red-400 uppercase tracking-wider text-center px-1 leading-tight";
                }
            } else {
                transmitiendo = false;
                
                btnPTT.className = "w-28 h-28 rounded-full bg-yellow-500 border-4 border-yellow-600/40 flex flex-col items-center justify-center transition-all duration-300 shadow-xl shadow-yellow-950/20 cursor-pointer select-none active:scale-95 z-10 shrink-0";
                iconPTT.textContent = "🎙️";
                iconPTT.className = "text-gray-950 text-2xl mb-0.5";
                pttTexto.textContent = "Pulsar para hablar";
                pttTexto.className = "text-[9px] font-black text-gray-950 uppercase tracking-wider text-center px-1 leading-tight";
                
                btnBC.className = "flex-1 max-w-[85px] py-4 px-1 rounded-xl text-center bg-gray-950 border border-gray-800 hover:bg-gray-900 transition-all text-gray-300 cursor-pointer shadow-sm active:scale-95";
                iconBC.textContent = "📢";
                textoBC.textContent = "A Todos";
                textoBC.className = "block text-[9px] font-black uppercase tracking-wider leading-none text-gray-400";

                emitirPaqueteAudio();
            }
        }

        function repetirUltimoAudio() {
            const reproductor = document.getElementById('audioReproductor');
            if (urlUltimoAudioRecibido) {
                reproductor.src = urlUltimoAudioRecibido;
                reproductor.play();
            } else {
                alert("No se ha recibido ninguna transmisión en esta sesión todavía.");
            }
        }

        function registrarPresencia() {
            db.collection("comunidades").doc(comunidad).collection("conectados").doc(usuario).set({
                usuario: usuario, bus: numBus, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            db.collection("comunidades").doc(comunidad).collection("conectados")
              .onSnapshot((snapshot) => {
                  const contenedor = document.getElementById('listaUsuariosConectados');
                  contenedor.innerHTML = '';
                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const item = document.createElement('span');
                      item.className = "bg-gray-850 text-gray-300 px-2 py-0.5 rounded-md border border-gray-800 text-[11px] flex items-center gap-1 shadow-sm";
                      item.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> [B:${data.bus}] ${data.usuario}`;
                      contenedor.appendChild(item);
                  });
              });
        }

        function emitirPaqueteAudio() {
            const datosAudio = {
                usuario: usuario, bus: numBus, timestamp: firebase.firestore.FieldValue.serverTimestamp(), urlAudio: ""
            };
            if (esBroadcastGlobal) {
                db.collection("broadcast_global").add(datosAudio);
            } else {
                db.collection("comunidades").doc(comunidad).collection("mensajes").add(datosAudio);
            }
        }

        function escucharCanales() {
            const lista = document.getElementById('listaMensajes');

            desvincularSala = db.collection("comunidades").doc(comunidad).collection("mensajes")
              .orderBy("timestamp", "desc").limit(2)
              .onSnapshot((snapshot) => {
                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      mostrarMensajeEnPantalla(`[Grupo] Bus ${data.bus}`, data.usuario, false);
                      if (data.urlAudio) {
                          urlUltimoAudioRecibido = data.urlAudio;
                          document.getElementById('audioReproductor').src = data.urlAudio;
                      }
                  });
              });

            desvincularGlobal = db.collection("broadcast_global")
              .orderBy("timestamp", "desc").limit(2)
              .onSnapshot((snapshot) => {
                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      mostrarMensajeEnPantalla(`📢 GENERAL (Bus ${data.bus})`, data.usuario, true);
                      if (data.urlAudio) {
                          urlUltimoAudioRecibido = data.urlAudio;
                          document.getElementById('audioReproductor').src = data.urlAudio;
                      }
                  });
              });
        }

        function mostrarMensajeEnPantalla(origen, conductor, esGlobal) {
            const lista = document.getElementById('listaMensajes');
            if (lista.innerHTML.includes('Canal limpio')) lista.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = esGlobal 
                ? "flex justify-between items-center bg-red-950/30 border border-red-900/40 px-2.5 py-1.5 rounded-lg shadow-inner animate-pulse"
                : "flex justify-between items-center bg-gray-900 border border-gray-800 px-2.5 py-1.5 rounded-lg shadow-inner";
            
            item.innerHTML = `
                <span class="font-bold text-[11px] ${esGlobal ? 'text-red-400' : 'text-yellow-500'}">${origen} - ${conductor}:</span>
                <span class="text-gray-400 text-[11px]">🔊 Voz recibida</span>
            `;
            lista.insertBefore(item, lista.firstChild);
        }

        async function conectarBluetooth() {
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                alert("Vinculado al manos libres: " + device.name);
            } catch (e) {
                alert("Buscando sistemas de audio manos libres vinculados a la tablet...");
            }
        }
    </script>
</body>
</html>
