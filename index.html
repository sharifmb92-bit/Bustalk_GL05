<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTalk Global</title>
    <!-- Tailwind para los estilos -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        .bg-parabolica {
            background-image: linear-gradient(to bottom, rgba(17, 24, 39, 0.85), rgba(17, 24, 39, 0.95)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
        }
        @keyframes parpadeoBus {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.4)); }
        }
        .animacion-bus {
            animation: parpadeoBus 2.5s infinite ease-in-out;
        }
        /* Oculta los controles de audio pero mantiene el elemento vivo */
        .audio-fantasma { width: 0; height: 0; visibility: hidden; position: absolute; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col justify-between p-4 selection:bg-yellow-500/30">

    <!-- ALERTA PERSONALIZADA UNIVERSAL -->
    <div id="alertaPersonalizada" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/70 backdrop-blur-sm transition-opacity">
        <div class="bg-gray-900 border border-gray-700 p-6 rounded-2xl shadow-2xl max-w-xs w-full text-center mx-4">
            <div class="text-yellow-500 text-4xl mb-3">⚠️</div>
            <p id="textoAlerta" class="text-white text-sm mb-6 leading-relaxed">Mensaje de error aquí.</p>
            <button onclick="cerrarAlerta()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-950 font-black py-3 rounded-xl transition-all shadow-lg active:scale-95 uppercase tracking-wider text-sm">
                OK
            </button>
        </div>
    </div>

    <!-- PANTALLA DE LOGIN -->
    <div id="pantallaLogin" class="max-w-md w-full mx-auto my-auto bg-gray-900 rounded-2xl shadow-2xl p-6 border border-gray-800">
        <div class="text-center mb-7">
            <div class="inline-flex items-center justify-center p-4 bg-yellow-500/10 rounded-full text-yellow-500 mb-4 animacion-bus">
                <!-- Icono de Bus Universal -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 16v3a1 1 0 01-1 1H6a1 1 0 01-1-1v-3m14 0V9a2 2 0 00-2-2H7a2 2 0 00-2 2v7m14 0H5m2 4h2m6 0h2m-8-4V10h10v6M7 10h10M4 10h1m14 0h1M9 7h6" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-wider uppercase">BusTalk <span class="text-yellow-500 text-sm font-medium lowercase">global</span></h1>
        </div>

        <div class="space-y-4">
            <div>
                <input type="text" id="inputNombre" placeholder="ID / Alias" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition-colors">
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="col-span-1">
                    <input type="text" id="inputBus" placeholder="Nº Bus" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-3 text-white text-center font-bold focus:outline-none focus:border-yellow-500 transition-colors">
                </div>
                <div class="col-span-2">
                    <input type="text" id="inputComunidad" placeholder="Línea / Grupo" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white uppercase font-mono tracking-wider focus:outline-none focus:border-yellow-500 transition-colors">
                </div>
            </div>

            <button onclick="iniciarApp()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-950 font-black py-3 rounded-xl transition-all shadow-lg shadow-yellow-900/20 active:scale-98 cursor-pointer mt-2 uppercase tracking-wider text-sm flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                START
            </button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL DE LA APP -->
    <div id="pantallaApp" class="max-w-md w-full mx-auto bg-gray-900 rounded-2xl shadow-2xl overflow-hidden border border-gray-800 flex-col flex-1 hidden">
        
        <div class="bg-parabolica p-4 flex justify-between items-center border-b border-gray-800 shadow-md">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 text-gray-950 font-black px-3 py-1.5 rounded-lg text-sm tracking-wide shadow shadow-black flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase font-bold text-gray-800 leading-none">BUS</span>
                    <span id="txtNumeroBus" class="text-base leading-none mt-0.5">---</span>
                </div>
                <div>
                    <h2 class="text-xl font-black tracking-wider uppercase m-0 leading-none">
                        <span class="text-yellow-500">Bus</span><span class="text-white">Talk</span>
                    </h2>
                    <p id="txtComunidadActiva" class="text-[10px] font-mono text-gray-400 uppercase tracking-widest mt-1">LÍNEA: ---</p>
                </div>
            </div>

            <!-- BOTONES SUPERIORES CON ICONOS UNIVERSALES -->
            <div class="flex items-center gap-2">
                <button onclick="conectarBluetooth()" class="p-2.5 bg-blue-900/40 text-blue-400 rounded-lg border border-blue-800/50 hover:bg-blue-800/60 transition-all cursor-pointer">
                    <!-- Icono Bluetooth Universal -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 7 10 10-5 5V2l5 5L7 17"/></svg>
                </button>
                <button onclick="salirApp()" class="p-2.5 bg-red-950/80 text-red-400 rounded-lg border border-red-900/50 hover:bg-red-900 transition-all cursor-pointer">
                    <!-- Icono Exit/Logout Universal -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                </button>
            </div>
        </div>

        <div class="p-4 flex flex-col flex-1 justify-between gap-4">
            
            <div class="bg-gray-950 border border-gray-850 rounded-xl p-3 flex flex-col gap-3 flex-1 justify-between min-h-[150px]">
                <div>
                    <div id="listaUsuariosConectados" class="flex flex-wrap gap-1.5 text-xs">
                        <!-- Se llena dinámicamente -->
                    </div>
                </div>

                <div class="border-t border-gray-900 pt-2 flex-1 flex flex-col justify-end">
                    <div id="listaMensajes" class="space-y-1.5 text-xs max-h-[120px] overflow-y-auto">
                        <p class="text-gray-600 italic text-center py-2">...</p>
                    </div>
                </div>

                <div id="contenedorAudio" class="hidden"></div>
                <audio id="audioReplayLocal" class="audio-fantasma" controls></audio>
            </div>

            <div class="flex items-center justify-between gap-2 py-4 px-2 bg-gray-900/50 rounded-2xl border border-gray-800/40">
                
                <button onclick="repetirUltimoAudioLocal()" class="flex-1 max-w-[85px] py-4 px-1 rounded-xl flex flex-col items-center justify-center bg-gray-950 border border-gray-800 hover:bg-gray-900 transition-all text-gray-300 cursor-pointer shadow-sm active:scale-95">
                    <!-- Icono Repetir Universal -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>

                <button id="btnPTT" onclick="toggleMicrofono(false)" class="w-28 h-28 rounded-full bg-yellow-500 border-4 border-yellow-600/40 flex flex-col items-center justify-center transition-all duration-300 shadow-xl shadow-yellow-950/10 cursor-pointer select-none active:scale-95 z-10 shrink-0">
                    <svg id="pttIcon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </button>

                <button id="btnBroadcast" onclick="toggleMicrofono(true)" class="flex-1 max-w-[85px] py-4 px-1 rounded-xl flex flex-col items-center justify-center bg-gray-950 border border-gray-800 hover:bg-gray-900 transition-all text-gray-300 cursor-pointer shadow-sm active:scale-95">
                    <!-- Icono Megáfono Universal -->
                    <svg id="btnBroadcastIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
                </button>
                
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE Y PEERJS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, addDoc, getDocs, onSnapshot, 
            query, where, orderBy, limit, serverTimestamp, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7b6_T0ze2HgXiYHfvUeL12JSXE7ZKogc",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            databaseURL: "https://misturnos-fe3ea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:873240d85ac5160f392476",
            measurementId: "G-B6RRDBDM4R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let usuario = "";
        let comunidad = "";
        let numBus = "";
        let wakeLock = null; 
        
        let miPeer = null;
        let miPeerId = null;
        let flujoMicrofonoLocal = null;
        let llamadasActivas = [];
        let grabadoraLocal = null;
        let urlUltimoAudioMemoria = null;
        let fragmentosAudioEnMemoria = [];
        let desvincularSenales = null;
        let desvincularConectados = null;

        let temporizadorAlarma = null;
        let intervaloAlarma = null;
        let bloqueadorBoton = false; // Seguro anti-atascos

        window.addEventListener('beforeunload', () => {
            if (miPeerId) deleteDoc(doc(db, "usuarios_activos", miPeerId));
        });

        window.mostrarAlerta = function(mensaje) {
            document.getElementById('textoAlerta').textContent = mensaje;
            document.getElementById('alertaPersonalizada').classList.remove('hidden');
        };

        window.cerrarAlerta = function() {
            document.getElementById('alertaPersonalizada').classList.add('hidden');
        };

        async function mantenerPantallaEncendida() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) {}
        }

        window.iniciarApp = function() {
            const inputNombre = document.getElementById('inputNombre').value.trim();
            const inputComunidad = document.getElementById('inputComunidad').value.trim().toUpperCase();
            const inputBus = document.getElementById('inputBus').value.trim();

            if (!inputNombre || !inputComunidad || !inputBus) {
                return mostrarAlerta("Data is required / Faltan datos");
            }

            // Truco para habilitar audio en navegadores estrictos
            const audioActivador = new Audio();
            audioActivador.play().catch(()=>{});

            usuario = inputNombre;
            comunidad = inputComunidad;
            numBus = inputBus;

            document.getElementById('txtNumeroBus').textContent = numBus;
            document.getElementById('txtComunidadActiva').textContent = `LÍNEA: ${comunidad}`;
            document.getElementById('pantallaLogin').classList.add('hidden');
            document.getElementById('pantallaApp').classList.remove('hidden');
            document.getElementById('pantallaApp').classList.add('flex');

            mantenerPantallaEncendida();
            iniciarWebRTC();
        };

        function iniciarWebRTC() {
            miPeer = new Peer({
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            miPeer.on('open', (id) => {
                miPeerId = id;
                setDoc(doc(db, "usuarios_activos", miPeerId), {
                    usuario: usuario, bus: numBus, comunidad: comunidad, peerId: miPeerId, timestamp: serverTimestamp()
                });
                escucharConectados();
                escucharSenalesVisuales();
            });

            miPeer.on('call', (llamadaEntrante) => {
                llamadaEntrante.answer(); 
                llamadaEntrante.on('stream', (flujoAudioRemoto) => {
                    reproducirAudioEnVivo(flujoAudioRemoto, llamadaEntrante);
                    grabarAudioTemporalParaReplay(flujoAudioRemoto, llamadaEntrante);
                });
            });
        }

        window.toggleMicrofono = async function(esGlobal) {
            if (bloqueadorBoton) return; // Evita dobles toques accidentales
            bloqueadorBoton = true;

            try {
                if (flujoMicrofonoLocal) {
                    await window.detenerMicrofono();
                } else {
                    await iniciarMicrofonoInterno(esGlobal);
                }
            } finally {
                setTimeout(() => bloqueadorBoton = false, 500); // Libera el botón medio segundo después
            }
        };

        async function iniciarMicrofonoInterno(esGlobal) {
            const btnPTT = document.getElementById('btnPTT');
            const iconPTT = document.getElementById('pttIcon');
            const btnBC = document.getElementById('btnBroadcast');

            try {
                flujoMicrofonoLocal = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });

                if (esGlobal) {
                    btnBC.className = "flex-1 max-w-[85px] py-4 px-1 rounded-xl flex flex-col items-center justify-center bg-red-950 border border-red-500 text-red-400 font-bold scale-105 z-20 shrink-0";
                } else {
                    btnPTT.className = "w-28 h-28 rounded-full bg-red-950 border-4 border-red-500 flex flex-col items-center justify-center shadow-xl shadow-red-900/40 cursor-pointer scale-105 z-10 shrink-0";
                    iconPTT.setAttribute("stroke", "#f87171"); // Se pone rojo
                }

                addDoc(collection(db, "senales_pantalla"), {
                    usuario: usuario, bus: numBus, peerId: miPeerId, comunidad: comunidad, esGlobal: esGlobal, timestamp: serverTimestamp()
                });

                const q = esGlobal 
                    ? collection(db, "usuarios_activos") 
                    : query(collection(db, "usuarios_activos"), where("comunidad", "==", comunidad));
                
                const snapshot = await getDocs(q);
                
                snapshot.forEach(documento => {
                    const datosReceptor = documento.data();
                    if (datosReceptor.peerId !== miPeerId) { 
                        const llamada = miPeer.call(datosReceptor.peerId, flujoMicrofonoLocal);
                        llamadasActivas.push(llamada);
                    }
                });

                temporizadorAlarma = setTimeout(activarAlarmaOlvido, 30000);

            } catch (error) {
                mostrarAlerta("Mic error / Error de micrófono");
                flujoMicrofonoLocal = null;
                restaurarBotones();
            }
        }

        window.detenerMicrofono = function() {
            if (!flujoMicrofonoLocal) return;

            clearTimeout(temporizadorAlarma);
            clearInterval(intervaloAlarma);

            restaurarBotones();

            flujoMicrofonoLocal.getTracks().forEach(track => track.stop());
            flujoMicrofonoLocal = null;

            llamadasActivas.forEach(llamada => llamada.close());
            llamadasActivas = [];
        };

        function restaurarBotones() {
            const btnPTT = document.getElementById('btnPTT');
            const iconPTT = document.getElementById('pttIcon');
            const btnBC = document.getElementById('btnBroadcast');

            btnPTT.className = "w-28 h-28 rounded-full bg-yellow-500 border-4 border-yellow-600/40 flex flex-col items-center justify-center transition-all shadow-xl cursor-pointer select-none active:scale-95 z-10 shrink-0";
            iconPTT.setAttribute("stroke", "#111827"); // Vuelve a negro
            
            btnBC.className = "flex-1 max-w-[85px] py-4 px-1 rounded-xl flex flex-col items-center justify-center bg-gray-950 border border-gray-800 hover:bg-gray-900 text-gray-300 cursor-pointer shadow-sm active:scale-95";
        }

        function activarAlarmaOlvido() {
            reproducirPitido(); 
            intervaloAlarma = setInterval(reproducirPitido, 2000); 
            const btnPTT = document.getElementById('btnPTT');
            btnPTT.classList.add('animate-bounce');
        }

        function reproducirPitido() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = "square";
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {}
        }

        function reproducirAudioEnVivo(stream, llamadaEntrante) {
            const contenedor = document.getElementById('contenedorAudio');
            const audioElem = document.createElement('audio');
            audioElem.srcObject = stream;
            audioElem.autoplay = true;
            audioElem.playsInline = true; 
            audioElem.className = "audio-fantasma";
            
            // Forzar reproducción
            audioElem.play().catch(e => console.warn("Auto-play requirió ayuda", e));
            
            contenedor.appendChild(audioElem);

            llamadaEntrante.on('close', () => audioElem.remove());
            stream.getTracks()[0].onended = () => audioElem.remove();
        }

        function grabarAudioTemporalParaReplay(stream, llamadaEntrante) {
            fragmentosAudioEnMemoria = [];
            
            try {
                grabadoraLocal = new MediaRecorder(stream);
                
                grabadoraLocal.ondataavailable = e => { 
                    if (e.data.size > 0) fragmentosAudioEnMemoria.push(e.data); 
                };
                
                grabadoraLocal.onstop = () => {
                    if (fragmentosAudioEnMemoria.length === 0) return;
                    const blob = new Blob(fragmentosAudioEnMemoria); 
                    if (urlUltimoAudioMemoria) URL.revokeObjectURL(urlUltimoAudioMemoria);
                    urlUltimoAudioMemoria = URL.createObjectURL(blob);
                };
                
                grabadoraLocal.start();

                llamadaEntrante.on('close', () => {
                    if(grabadoraLocal && grabadoraLocal.state !== "inactive") grabadoraLocal.stop();
                });
                
            } catch (e) {
                console.warn("La grabación para replay no es compatible en este dispositivo.");
            }
        }

        window.repetirUltimoAudioLocal = function() {
            if (urlUltimoAudioMemoria) {
                const reproductor = document.getElementById('audioReplayLocal');
                reproductor.src = urlUltimoAudioMemoria;
                reproductor.play().catch(() => mostrarAlerta("Error reproduciendo / Playback error"));
            } else {
                mostrarAlerta("No data / Sin grabaciones");
            }
        };

        function escucharConectados() {
            const q = query(collection(db, "usuarios_activos"), where("comunidad", "==", comunidad));
            desvincularConectados = onSnapshot(q, (snapshot) => {
                const contenedor = document.getElementById('listaUsuariosConectados');
                contenedor.innerHTML = '';
                let hayCompaneros = false;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.peerId !== miPeerId) {
                        hayCompaneros = true;
                        const item = document.createElement('span');
                        item.className = "bg-gray-850 text-gray-300 px-2 py-0.5 rounded-md border border-gray-800 text-[11px] flex items-center gap-1 shadow-sm";
                        item.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> [B:${data.bus}] ${data.usuario}`;
                        contenedor.appendChild(item);
                    }
                });

                if (!hayCompaneros) {
                    contenedor.innerHTML = `<span class="bg-gray-900 text-gray-400 px-2 py-0.5 rounded-md border border-gray-800 text-[11px] flex items-center gap-1"><span class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-pulse"></span> ...</span>`;
                }
            });
        }

        function escucharSenalesVisuales() {
            const q = query(collection(db, "senales_pantalla"), orderBy("timestamp", "desc"), limit(1));
            desvincularSenales = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (!data.peerId || data.peerId === miPeerId) return;
                        
                        if (data.esGlobal || data.comunidad === comunidad) {
                            mostrarMensajeEnPantalla(
                                data.esGlobal ? `📢 Bus ${data.bus}` : `[G] Bus ${data.bus}`, 
                                data.usuario, data.esGlobal
                            );
                        }
                    }
                });
            });
        }

        function mostrarMensajeEnPantalla(origen, conductor, esGlobal) {
            const lista = document.getElementById('listaMensajes');
            if (lista.innerHTML.includes('...')) lista.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = esGlobal ? "flex justify-between items-center bg-red-950/30 border border-red-900/40 px-2.5 py-1.5 rounded-lg shadow-inner animate-pulse" : "flex justify-between items-center bg-gray-900 border border-gray-800 px-2.5 py-1.5 rounded-lg shadow-inner";
            item.innerHTML = `<span class="font-bold text-[11px] ${esGlobal ? 'text-red-400' : 'text-yellow-500'}">${origen} - ${conductor}</span><span class="text-gray-400 text-[11px]">🔊</span>`;
            
            lista.insertBefore(item, lista.firstChild);

            if (lista.children.length > 3) {
                lista.removeChild(lista.lastChild);
            }
        }

        window.salirApp = function() {
            window.detenerMicrofono();
            if (miPeerId) deleteDoc(doc(db, "usuarios_activos", miPeerId));
            if (miPeer) miPeer.destroy();
            if (desvincularSenales) desvincularSenales();
            if (desvincularConectados) desvincularConectados();
            if (wakeLock) wakeLock.release().then(() => wakeLock = null);

            // LIMPIAR DATOS PARA EL SIGUIENTE CONDUCTOR
            document.getElementById('inputNombre').value = '';
            document.getElementById('inputBus').value = '';
            document.getElementById('inputComunidad').value = '';

            document.getElementById('pantallaApp').classList.remove('flex');
            document.getElementById('pantallaApp').classList.add('hidden');
            document.getElementById('pantallaLogin').classList.remove('hidden');
        };

        window.conectarBluetooth = async function() {
            try {
                const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                mostrarAlerta("Bluetooth: " + device.name);
            } catch (e) {
                mostrarAlerta("Bluetooth Error / No compatible");
            }
        };
    </script>
</body>
</html>
